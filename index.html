<!--Página principal-->

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Planner - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!--Navbar-->
    <!--navbar-expand-Ig = Expande em telas grandes-->
    <nav class="navbar navbar-expand-Ig navbar-dark bg-secondary bg-gradient">
        <div class="container"> <!--Centralizar o conteúdo-->
            <a class="navbar-brand" href="#">Study Planner</a>
            <div class="navbar-nav ms-auto"> <!--ms-auto = margin start  -> coloca na direita-->
                <span class="nav-link text-white" id="nomeUsuario"></span> <!--Esse span vazio vai ser preenchido com o nome do usuário pela javascript-->
                <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row"> <!--grid-->

            <!--Card do formulário de cadastro das atividades-->
            <div class="col-md-4"> <!--md = telas médias (em telas médias a coluna ocupa 4 de 12 espaços)-->
                <div class="card mb-4">
                    <div class="card-header bg-dark bg-gradient text-white">
                        <h5 class="mb-0">Nova Atividade</h5>
                    </div>
                    <div class="card-body">
                        <form id="formAtividade">
                            <div class="mb-3">
                                <label for="materia" class="form-label">Matéria</label>
                                <input type="text" class="form-control" id="materia" required>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descrição</label>
                                <textarea class="form-control" id="descricao" rows="2" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="prazo" class="form-label">Data de entrega</label>
                                <input type="date" class="form-control" id="prazo" required>
                            </div>

                            <button type="submit" class="btn btn-dark bg-gradient w-100">
                                <i class="bi bi-plus-circle"></i> Cadastrar Atividade
                            </button>
                        </form>
                    </div>
                </div>

                 <!--Card do resumo da semana-->
                <div class="card mb-4">
                    <div class="card-header bg-dark bg-gradient text-white">
                        <h5 class="mb-0">Resumo da Semana</h5>
                    </div>
                    <div class="card-body">
                        <div id="resumoSemana">
                            <p>Carregando...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!--Temporizador e lista de atividades-->
            <div class="col-md-8"> <!--Coluna que ocupa 8 de 12 espaços-->
                <!--Temporizador-->
                <div class="card mb-4">
                    <div class="card-header bg-black bg-gradient text-white">
                        <h5 class="mb-0">Temporizador de Estudos</h5>
                    </div>
                    <div class="card-body text-center">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <select class="form-select" id="selecionarAtividade">
                                    <option value="">Selecione uma atividade</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <h2 id="cronometro">00:00:00</h2>
                            </div>
                        </div>

                        <div class="btn-group" role="group">
                            <button class="btn btn-warning" onclick="pausarCronometro()" id="btnPausar" disabled> <!--Para ele começar desabilitado-->
                                <i class="bi bi-pause"></i> Pausar
                            </button>
                            <button class="btn btn-success" onclick="iniciarCronometro()" id="btnIniciar">
                                <i class="bi bi-play"></i> Iniciar
                            </button>
                            <button class="btn btn-danger" onclick="pararCronometro()" id="btnParar" disabled>
                                <i class="bi bi-stop"></i> Parar
                            </button>
                        </div>

                        <div class="mt-3" id="areaRespostaIA" style="display: none;">
                            <div class="alert alert-info">
                                <strong>Dica da IA:</strong>
                                <p id="respostaIA"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!--Lista de atividades-->
                <div class="card">
                    <div class="card-header bg-black bg-gradient text-white">
                        <h5 class="mb-0">Minhas Atividades</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Matéria</th>
                                        <th>Descrição</th>
                                        <th>Prazo</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAtividades">
                                    <tr>
                                        <td colspan="5" class="text-center">Nenhuma atividade cadastrada</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
  </body>
</html>
