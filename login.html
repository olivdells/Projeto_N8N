<!--Página de login-->

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Planner - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-light"> <!--Aplica o tema de fundo cinza claro do Bootstrap no corpo da página-->
    <div class="container">
        <div class="row justify-content-center mt-5"> <!--Centraliza o conteúdo horizontalmente-->
            <div class="col-md-6 col-lg-4"> <!--Define que em telas médias vai ter 6 colunas e em telas grandes, 4-->
                <div class="card shadow"> <!--Cria um cartão com sombra-->
                    <div class="card-body"> <!--Cria o cartão e o espaço para colocar o conteúdo-->
                        <h2 class="text-center mb-4">Study Planner</h2> <!--mb = margin bottom-->
                        <h4 class="text-center mb-4">Login</h4>

                        <form id="loginForm"> <!--Formulário-->
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                            </div>

                            <button type="submit" class="btn btn-secondary w-100">Entrar</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="cadastro.html"> Não tem conta? Cadastre-se</a>
                        </div>

                        <div id="mensagem" class="mt-3 text-danger"></div> <!--mostrará mensagens do javascript aqui-->>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--Script que ja vem com o boostrap e fornece funcionalidades interativas-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!--Script com a lógica de autenticação-->
    <script src="auth.js"></script>
  </body>
</html>
